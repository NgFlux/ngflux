name: Build and publish @ngflux/ngflux

on:
  push:
    tags:
      - "*"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      # TOKEN: ${{ secrets.NPM_TOKEN }}
      ID_NAME: ${{ secrets.ID_NAME }}
      ID_EMAIL: ${{ secrets.ID_EMAIL }}
      LIB_VERSION: ${{ github.ref_name }}
    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        package-manager-cache: false

    # - name: Enable corepack
    #   run: corepack enable

    # - name: Install pnpm
    #   run: corepack prepare pnpm@latest --activate

    - name: Install Dependencies
      run: npm ci

    - name: Build Packages
      run: npm exec ng build @ngflux/ngflux

    - name: Update Git config
      run: |
        git config --global user.name "$ID_NAME"
        git config --global user.email "$ID_EMAIL"

    - name: Publish Packages
      run: |
        pushd dist/ngflux

        # npm set //registry.npmjs.org/:_authToken $TOKEN

        npm version $LIB_VERSION

        npm publish --access public

        popd
