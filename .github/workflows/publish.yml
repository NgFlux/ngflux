name: Build and publish @ngflux/ngflux

on:
  push:
    tags:
      - "*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    env:
      ID_NAME: ${{ secrets.ID_NAME }}
      ID_EMAIL: ${{ secrets.ID_EMAIL }}
      LIB_VERSION: ${{ github.ref_name }}
    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        package-manager-cache: false

    - name: Install Dependencies
      run: npm ci

    - name: Build Library
      run: npm exec ng build @ngflux/ngflux

    - name: Copy LICENSE
      run: cp -f LICENSE dist/ngflux/

    - name: Copy README.md
      run: cp -f README.md dist/ngflux/

    - name: Update Git config
      run: |
        git config --global user.name "$ID_NAME"
        git config --global user.email "$ID_EMAIL"

    - name: Publish Packages
      run: |
        pushd dist/ngflux

        npm version $LIB_VERSION

        npm publish --access public

        popd
