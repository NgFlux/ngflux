<header class="header">
  <div class="toolbar">
    <a routerLink="/" class="logo">
      <img src="assets/images/logo.png" alt="">
    </a>

    <div class="spacer"></div>

    <nav class="navbar" (click)="onNavbarClick($event)">
      <div class="nav-btn" (click)="openMenu.update(v => !v)">
        <i class="fa-solid fa-bars"></i>
      </div>

      <ul class="menu" [class.open]="openMenu()">
        <li>
          <a routerLink="/guides">
            <span>Guides</span>
          </a>
        </li>

        <li>
          <a routerLink="/features">
            <span>Features</span>
          </a>
        </li>

        <li>
          <a target="_blank" href="https://github.com/NgFlux/ngflux">
            <i class="menu-icon fa-brands fa-github"></i>
            <span>GitHub</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="body">
  <div class="content">
    <ng-content></ng-content>
  </div>

  <footer class="footer">
    <!--  -->

    <div class="copyright">
      <span>Copyright &copy; {{ year }} <a target="_blank" href="https://www.cyberpull.com">Cyberpull Technologies Limited</a> and <a target="_blank" href="https://github.com/NgFlux/ngflux/graphs/contributors">NgFlux Contributors</a></span>
    </div>
  </footer>
</main>
