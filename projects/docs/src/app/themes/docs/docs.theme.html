<div class="overlay" [class.open]="leftOpen()" (click)="leftOpen.set(false)"></div>

<div class="left" [class.open]="leftOpen()" (click)="$event.stopPropagation()">
  <div class="left-btn" (click)="leftOpen.update(v => !v)">
    <i class="fa-solid" [ngClass]="leftBtn()"></i>
  </div>

  <!--  -->
</div>

<div class="main">
  <div class="header">
    <div class="title">
      <!--  -->
    </div>

    <div class="right-btn" (click)="rightOpen.update(v => !v)">
      <i class="fa-solid" [ngClass]="rightBtn()"></i>
    </div>
  </div>

  <div class="body">
    <div class="content">
      <ng-content></ng-content>
    </div>

    <div class="right" [class.open]="rightOpen()">
      <!--  -->
    </div>
  </div>

</div>
