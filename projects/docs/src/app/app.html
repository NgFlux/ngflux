<ngf-root>
  <main>
    <div>
      <a href="" (click)="openAlert($event)">Open Alert</a>
    </div>

    <div>
      <a href="" (click)="openConfirm($event)">Open Confirmation</a>
    </div>

    <div>
      <a href="" (click)="openPrompt($event)">Open Prompt</a>
    </div>

    <p>&nbsp;</p>

    <div>
      <a href="" (click)="showLoading($event)">Show Loading</a>
    </div>

    <p>&nbsp;</p>
    <p>&nbsp;</p>

    <div>
      <ngf-pagination [data]="{}">
        <div>Paginated content here</div>
      </ngf-pagination>
    </div>
  </main>
</ngf-root>
