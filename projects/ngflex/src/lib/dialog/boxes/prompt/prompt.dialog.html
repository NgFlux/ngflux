<ngf-dialog-header>
  <h1 ngf-dialog-title>{{ options.title }}</h1>
</ngf-dialog-header>

<ngf-dialog-body>
  <div class="content" [innerHTML]="options.content"></div>
  <input type="text" name="text" [(ngModel)]="text">
</ngf-dialog-body>

<ngf-dialog-footer>
  @for (btn of buttons(); track $index) {
    <ngf-button [theme]="btn.theme" (click)="onButtonClick($event, btn)" [disabled]="btn.disabled?.() ?? false">
      <span>{{ btn.text }}</span>
    </ngf-button>
  }
</ngf-dialog-footer>
