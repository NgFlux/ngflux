<ngf-dialog-header>
  <h1 ngf-dialog-title>{{ options.title }}</h1>
</ngf-dialog-header>

<ngf-dialog-body>
  <div [innerHTML]="options.content"></div>
</ngf-dialog-body>

<ngf-dialog-footer>
  <ngf-button theme="dark" (click)="dialogRef.close()">
    <span>Cancel</span>
  </ngf-button>

  <ngf-button theme="primary" (click)="dialogRef.close(true)">
    <span>Okay</span>
  </ngf-button>
</ngf-dialog-footer>
